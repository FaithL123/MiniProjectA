apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app-container
        image: faithlim123/flask-app:v1.0.0
        ports:
        - containerPort: 5000
      imagePullSecrets:
      - name: docker-hub-secret